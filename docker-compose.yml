services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - ollama
    ports:
      - "4800:4800"
    environment:
      HOST: 0.0.0.0
      PORT: 4800
      OLLAMA_HOST: http://ollama:11434
      UPDATER_URL: ${UPDATER_URL:-http://updater:4810}
      UPDATER_TOKEN: ${UPDATER_TOKEN:-}
    # nsjail needs these capabilities to create Linux namespaces
    cap_add:
      - SYS_PTRACE     # for process tracing
      - SYS_ADMIN      # for mount/PID/user namespaces
      - NET_ADMIN       # for network namespace (optional, if restricting network later)
    security_opt:
      - seccomp=unconfined  # nsjail manages its own seccomp filters
    volumes:
      - maestro_data:/root/.maestro
      - maestro_projects:/root/maestro-projects
      - maestro_gh:/root/.config/gh
      - maestro_claude:/root/.claude
      - maestro_codex:/root/.codex
      # cgroup v2 mount needed for nsjail memory/CPU limits
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  updater:
    build:
      context: .
      dockerfile: updater/Dockerfile
    environment:
      UPDATER_HOST: 0.0.0.0
      UPDATER_PORT: 4810
      UPDATER_TOKEN: ${UPDATER_TOKEN:-}
      GITHUB_REPO: ${GITHUB_REPO:-olsommer/maestro}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      STACK_DIR: ${STACK_DIR:?Set STACK_DIR in .env to the absolute host path of this Maestro checkout}
      RELEASES_DIR: ${RELEASES_DIR:-}
      CURRENT_LINK: ${CURRENT_LINK:-}
      COMPOSE_FILE: docker-compose.yml
      UPDATE_SERVICES: ${UPDATE_SERVICES:-server}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${STACK_DIR:?Set STACK_DIR in .env to the absolute host path of this Maestro checkout}:${STACK_DIR:?Set STACK_DIR in .env to the absolute host path of this Maestro checkout}
    restart: unless-stopped

volumes:
  maestro_data:
  maestro_projects:
  maestro_gh:
  maestro_claude:
  maestro_codex:
  ollama_data:
