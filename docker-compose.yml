services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - ollama
      - updater
    ports:
      - "4800:4800"
    environment:
      HOST: 0.0.0.0
      PORT: 4800
      OLLAMA_HOST: http://ollama:11434
      UPDATER_URL: ${UPDATER_URL:-http://updater:4810}
      UPDATER_TOKEN: ${UPDATER_TOKEN:-}
    volumes:
      - maestro_data:/root/.maestro
      - maestro_gh:/root/.config/gh
      - maestro_claude:/root/.claude
      - maestro_codex:/root/.codex
      - /var/run/docker.sock:/var/run/docker.sock

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  updater:
    build:
      context: .
      dockerfile: updater/Dockerfile
    environment:
      UPDATER_HOST: 0.0.0.0
      UPDATER_PORT: 4810
      UPDATER_TOKEN: ${UPDATER_TOKEN:-}
      GITHUB_REPO: ${GITHUB_REPO:-olsommer/maestro}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-maestro}
      RELEASES_DIR: /state/releases
      CURRENT_LINK: /state/current
      COMPOSE_FILE: docker-compose.yml
      UPDATE_SERVICES: ${UPDATE_SERVICES:-server}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - updater_state:/state
    restart: unless-stopped

volumes:
  maestro_data:
  maestro_gh:
  maestro_claude:
  maestro_codex:
  ollama_data:
  updater_state:
